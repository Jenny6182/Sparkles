<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/tone"></script>
    <link rel="stylesheet" href="style.css">
    <title>Sparkles</title>
</head>
<body>
    <p style="margin-top: -20px;">Click to start</p>
    <!-- Black Mask -->
    <canvas id="mask"></canvas>

    <!-- Scene Picture -->
    

    <!-- Player -->
    <div id="player-flame" class= "flame active"></div>
    <div id="player-sparkler" class="sparkler active"></div>

    <!-- Target -->
    <div id="target-flame" class= "flame"></div>
    <div id="target-sparkler" class="sparkler"></div>

    <div id="beat-indicator" class="beatlight-unactivated"></div>
    <div id="score">Accuracy: </div>

    <script src="game.js"></script>
</body>

<div class="holder">
  <div class="candle">
    <div class="blinking-glow"></div>
    <div class="thread"></div>
    <div class="glow"></div>
  </div>
</div>


</html>
