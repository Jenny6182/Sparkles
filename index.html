<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/tone"></script>
  <link rel="stylesheet" href="app.css">
  <title>Sparkles</title>
</head>
<body>
  <p id="start-text">Click to start</p>
  <!-- The black canvas mask -->
  <canvas id="mask"></canvas>

  <!-- Retry overlay -->
  <div id="retry-overlay">
    <div id="retry-box">
      <p id="retry-text">The spark still needs your help... retry?</p>
      <button id="retry-btn">OK</button>
    </div>
  </div>

  <!-- Success overlay -->
  <div id="success-overlay">
    <div id="success-box">
      <p id="success-text">The spark is free!</p>
      <button id="next-btn">Continue</button>
    </div>
  </div>

  <!-- Progress bar using accuracy -->
  <div id="score" aria-label="Accuracy HUD">
    <div id="accuracy-row">
      <span id="accuracy-text">0%</span>
      <div id="accuracy-bar" aria-hidden="true">
        <div id="accuracy-fill"></div>
        <div id="accuracy-flare"></div>
      </div>
    </div>
  </div>

  <!-- Beat indicator -->
  <div id="beat-indicator" class="beatlight-unactivated"></div>

  <!-- All js scripts, order is required -->
  <script src="levels.js"></script>
  <script src="audio.js"></script>
  <script src="rhythm.js"></script>
  <script src="orb.js"></script>
  <script src="TargetOrb.js"></script>
  <script src="visuals.js"></script>
  <script src="game_refactored.js"></script>
</body>
</html>
